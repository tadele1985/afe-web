{% load i18n %}
<form class="flex flex-col px-4 h-full"
    hx-post="{% url "core:user_update" pk=form.instance.id %}"
      hx-swap="outerHTML">
    {% csrf_token %}
    <div class="flex-1 flex flex-col gap-2 h-full">
        <h1 class="font-bold text-lg">{% trans "Edit User" %}</h1>
        {{ form }}
    
        <div class="flex justify-between gap-4 py-4">
            <input type="submit" class="btn btn-neutral flex-1" value='{% trans "Submit" %}'>
        </div>
    </div>
</form>
