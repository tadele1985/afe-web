{% load i18n %}
<form class="flex flex-col px-4 h-full"
      onsubmit="submitButton.disabled = true; return true;"
      hx-post="{% url "core:duplicate_operation_plan" pk=id %}"
      hx-swap="outerHTML">
  {% csrf_token %}
  <div class="flex-1 flex flex-col gap-2 h-full">
    <h1 class="font-bold text-lg">{% trans "Duplicate Operation Plan" %}</h1>
    {{ form }}
    <div id="duplicate_location_form"></div>
    <div class="flex justify-between gap-4 py-4">
      <input type="submit"
             class="btn btn-neutral flex-1"
             value="{% trans "Submit" %}"
             name="submitButton">
    </div>
  </div>
</form>
