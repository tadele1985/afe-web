{% load i18n %}
<form class="flex flex-col px-4 h-full"
      hx-post="{% url "core:edit_operation_plan" pk=id %}"
      hx-swap="outerHTML">
  {% csrf_token %}
  <div class="flex-1 flex flex-col gap-2 h-full">
    <h1 class="font-bold text-lg">{% trans "Edit Operation Plan" %}</h1>
    {{ form }}
    <div hx-get="{% url 'core:get_location_form' %}?location_id={{ form.instance.location.id }}&operation_type={{ form.instance.operation_type.id }}"
         hx-swap="outerHTML"
         hx-trigger="load"></div>
    <div class="flex justify-between gap-4 py-4">
      <input type="submit"
             class="btn btn-neutral flex-1"
             value="{% trans "Submit" %}">
    </div>
  </div>
</form>
