<div class="text-sm breadcrumbs mb-5">
    <ul>
        {% for breadcrumb in breadcrumbs %}
            <li class="breadcrumb-item {% if forloop.last %}font-bold{% else %}text-primary{% endif %}">
            {% if not forloop.last %}
                <a href="{{ breadcrumb.url }}">{{ breadcrumb.name }}</a>
            {% else %}
                {{ breadcrumb.name }}
            {% endif %}
            </li>
        {% endfor %}
    </ul>
</div>
