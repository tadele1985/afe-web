<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 my-4 md:px-8">
    {% for field in form.hidden_fields %}{{ field }}{% endfor %}
    {% for field in form.visible_fields %}
        <div class="flex flex-col gap-2">
            {{ field.label_tag }}
            {{ field }}
        </div>
    {% endfor %}
</div>
